<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="600" height="400" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="30" y="36" font-family="sans-serif" font-size="16" font-weight="600" fill="#1E293B">Traffic Sources</text>

  <!-- Toggle -->
  <rect x="460" y="20" width="110" height="32" rx="8" fill="#F1F5F9"/>
  <rect x="460" y="20" width="55" height="32" rx="8" fill="#4F46E5"/>
  <text x="487" y="41" font-family="sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle">Amount</text>
  <text x="541" y="41" font-family="sans-serif" font-size="12" font-weight="500" fill="#64748B" text-anchor="middle">Percent</text>

  <!-- Donut chart -->
  <g transform="translate(215, 210)">
    <!-- Segment: Search (34.7%) -->
    <path d="M0,-100 A100,100 0 0,1 82,-57 L53,-37 A65,65 0 0,0 0,-65 Z" fill="#4F46E5"/>
    <!-- Segment: Social Media (28.4%) -->
    <path d="M82,-57 A100,100 0 0,1 45,89 L29,58 A65,65 0 0,0 53,-37 Z" fill="#7C3AED"/>
    <!-- Segment: Direct (22%) -->
    <path d="M45,89 A100,100 0 0,1 -97,21 L-63,14 A65,65 0 0,0 29,58 Z" fill="#EC4899"/>
    <!-- Segment: Email (14.1%) -->
    <path d="M-97,21 A100,100 0 1,1 0,-100 L0,-65 A65,65 0 1,0 -63,14 Z" fill="#F59E0B"/>
  </g>

  <!-- Center content -->
  <text x="215" y="202" font-family="sans-serif" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle">343.5K</text>
  <text x="215" y="222" font-family="sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Total Visitors</text>
  <text x="215" y="236" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Monthly</text>

  <!-- Legend -->
  <g transform="translate(400, 70)">
    <!-- Search -->
    <circle cx="0" cy="0" r="5" fill="#4F46E5"/>
    <text x="14" y="4" font-family="sans-serif" font-size="13" fill="#64748B">Search</text>
    <text x="160" y="4" font-family="sans-serif" font-size="14" font-weight="600" fill="#0F172A" text-anchor="end">120.5K</text>
    <!-- Social Media -->
    <circle cx="0" cy="28" r="5" fill="#7C3AED"/>
    <text x="14" y="32" font-family="sans-serif" font-size="13" fill="#64748B">Social Media</text>
    <text x="160" y="32" font-family="sans-serif" font-size="14" font-weight="600" fill="#0F172A" text-anchor="end">98.5K</text>
    <!-- Direct -->
    <circle cx="0" cy="56" r="5" fill="#EC4899"/>
    <text x="14" y="60" font-family="sans-serif" font-size="13" fill="#64748B">Direct</text>
    <text x="160" y="60" font-family="sans-serif" font-size="14" font-weight="600" fill="#0F172A" text-anchor="end">76.0K</text>
    <!-- Email -->
    <circle cx="0" cy="84" r="5" fill="#F59E0B"/>
    <text x="14" y="88" font-family="sans-serif" font-size="13" fill="#64748B">Email</text>
    <text x="160" y="88" font-family="sans-serif" font-size="14" font-weight="600" fill="#0F172A" text-anchor="end">48.5K</text>
  </g>

  <!-- Footer -->
  <text x="30" y="375" font-family="sans-serif" font-size="14" font-weight="500" fill="#4F46E5">View all 23 channels</text>
</svg>
