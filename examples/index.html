<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartKit — Pure JS Charting Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      padding: 40px 20px;
      color: #0F172A;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748B;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .chart-wrapper {
      height: 380px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin: 48px 0 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>ChartKit</h1>
  <p class="subtitle">Pure JavaScript Charting · No Dependencies · SVG · RTL/LTR · Responsive</p>

  <div class="section-title">Donut Charts</div>
  <div class="grid">

    <!-- Donut: data-ck-* attributes -->
    <div class="chart-wrapper ck-chart"
         data-ck-type="donut"
         data-ck-title="Traffic Sources"
         data-ck-data='[{"id":"search","label":"Search","value":120500,"color":"#4F46E5"},{"id":"social","label":"Social Media","value":98500,"color":"#7C3AED"},{"id":"direct","label":"Direct","value":76000,"color":"#EC4899"},{"id":"email","label":"Email","value":48500,"color":"#F59E0B"}]'
         data-ck-center-label="Total Visitors"
         data-ck-center-value="343.5K"
         data-ck-center-unit="Monthly"
         data-ck-show-toggle="true"
         data-ck-toggle-options='[{"label":"Amount","value":"amount"},{"label":"Percent","value":"percent"}]'
         data-ck-footer-label="View all 23 channels">
    </div>

    <!-- Donut: JS API -->
    <div id="donut-js" class="chart-wrapper"></div>

  </div>

  <div class="section-title">Bar Charts</div>
  <div class="grid">

    <!-- Bar chart -->
    <div class="chart-wrapper ck-chart"
         data-ck-type="bar"
         data-ck-title="Weekly Downloads"
         data-ck-data='[{"label":"Mon","value":12500},{"label":"Tue","value":18200},{"label":"Wed","value":15800},{"label":"Thu","value":22000},{"label":"Fri","value":19500},{"label":"Sat","value":28000}]'
         data-ck-legend-position="bottom"
         data-ck-show-toggle="true"
         data-ck-toggle-options='[{"label":"Amount","value":"amount"},{"label":"Percent","value":"percent"}]'>
    </div>

    <!-- Bar chart JS API -->
    <div id="bar-js" class="chart-wrapper"></div>

  </div>

  <script src="../dist/chartkit.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ChartKit.autoInit();
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var donutEl = document.getElementById('donut-js');
      var barEl = document.getElementById('bar-js');

      if (donutEl) {
        ChartKit.create(donutEl, {
          type: 'donut',
          title: 'Browser Usage',
          data: [
            { id: 'chrome', label: 'Chrome', value: 450000, color: '#10B981' },
            { id: 'safari', label: 'Safari', value: 320000, color: '#3B82F6' },
            { id: 'firefox', label: 'Firefox', value: 180000, color: '#F97316' },
            { id: 'edge', label: 'Edge', value: 95000, color: '#6366F1' },
            { id: 'other', label: 'Other', value: 55000, color: '#84CC16' },
          ],
          centerContent: {
            label: 'Total Users',
            value: '1,100,000',
            unit: 'Sessions',
          },
          toggle: {
            show: true,
            options: [
              { label: 'Amount', value: 'amount' },
              { label: 'Percent', value: 'percent' },
            ],
          },
          legend: { position: 'right', show: true },
          footer: { label: 'View all browsers' },
          othersThreshold: 8,
        });
      }

      if (barEl) {
        ChartKit.create(barEl, {
          type: 'bar',
          title: 'Feature Usage',
          data: [
            { label: 'Dashboard', value: 450000, color: '#4F46E5' },
            { label: 'Analytics', value: 280000, color: '#EC4899' },
            { label: 'Reports', value: 350000, color: '#10B981' },
            { label: 'Settings', value: 180000, color: '#F59E0B' },
            { label: 'API', value: 120000, color: '#8B5CF6' },
          ],
          toggle: {
            show: true,
            options: [
              { label: 'Amount', value: 'amount' },
              { label: 'Percent', value: 'percent' },
            ],
          },
          legend: { position: 'bottom', show: true },
        });
      }
    });
  </script>

</body>
</html>
