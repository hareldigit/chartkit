<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartKit — Realtime Updates</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      padding: 40px 20px;
      color: #0F172A;
    }
    h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #64748B; margin-bottom: 40px; }

    .demo-area {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .chart-wrapper { height: 380px; }

    .controls {
      max-width: 900px;
      margin: 24px auto;
      text-align: center;
    }

    .controls button {
      padding: 10px 24px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 0 4px;
    }

    .controls button:hover { opacity: 0.85; }
    .controls button.stop { background: #EF4444; }

    .status {
      text-align: center;
      color: #64748B;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <h1>ChartKit — Realtime Updates</h1>
  <p class="subtitle">Smooth transitions when data changes in realtime</p>

  <div class="controls">
    <button id="btn-start">Start Realtime</button>
    <button id="btn-stop" class="stop">Stop</button>
    <button id="btn-bump">Random Bump</button>
  </div>
  <p class="status" id="status">Stopped</p>

  <div class="demo-area">
    <div id="donut-realtime" class="chart-wrapper"></div>
    <div id="bar-realtime" class="chart-wrapper"></div>
  </div>

  <script src="../dist/chartkit.js"></script>
  <script>
    var donutChart;
    var barChart;
    var intervalId = null;

    var donutBaseData = [
      { id: 'home', label: 'Homepage', value: 120 },
      { id: 'pricing', label: 'Pricing', value: 85 },
      { id: 'docs', label: 'Documentation', value: 65 },
      { id: 'blog', label: 'Blog', value: 40 },
    ];

    var barBaseData = [
      { label: 'EU', value: 150 },
      { label: 'US', value: 220 },
      { label: 'AS', value: 180 },
      { label: 'Other', value: 290 },
    ];

    function randomize(data) {
      return data.map(function (item) {
        var newItem = Object.assign({}, item);
        newItem.value = Math.max(5, item.value + Math.floor((Math.random() - 0.5) * 60));
        return newItem;
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      donutChart = ChartKit.create(document.getElementById('donut-realtime'), {
        type: 'donut',
        title: 'Live Views by Page',
        data: donutBaseData,
        centerContent: { label: 'Total Views', value: '310', unit: 'Live' },
        toggle: { show: true, options: [{ label: 'Amount', value: 'amount' }, { label: 'Percent', value: 'percent' }] },
        legend: { position: 'right', show: true },
      });

      barChart = ChartKit.create(document.getElementById('bar-realtime'), {
        type: 'bar',
        title: 'Live Users by Region',
        data: barBaseData,
        legend: { position: 'bottom', show: true },
      });
    });

    document.getElementById('btn-start').addEventListener('click', function () {
      if (intervalId) return;
      document.getElementById('status').textContent = 'Running — updating every 2s';
      intervalId = setInterval(function () {
        donutBaseData = randomize(donutBaseData);
        barBaseData = randomize(barBaseData);
        donutChart.updateData(donutBaseData);
        barChart.updateData(barBaseData);
      }, 2000);
    });

    document.getElementById('btn-stop').addEventListener('click', function () {
      clearInterval(intervalId);
      intervalId = null;
      document.getElementById('status').textContent = 'Stopped';
    });

    document.getElementById('btn-bump').addEventListener('click', function () {
      donutBaseData = randomize(donutBaseData);
      barBaseData = randomize(barBaseData);
      donutChart.updateData(donutBaseData);
      barChart.updateData(barBaseData);
    });
  </script>

</body>
</html>
