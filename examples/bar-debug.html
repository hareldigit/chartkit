<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body { background:#f0f0f0; padding:40px; }
#test { width:600px; height:400px; border:1px solid #ccc; background:#fff; }
</style></head><body>
<h3>Bar Chart — Standalone Test</h3>
<div id="test"></div>
<script src="../dist/chartkit.js"></script>
<script>
var el = document.getElementById('test');
var c = ChartKit.create(el, {
  type: 'bar',
  title: 'Monthly Revenue',
  data: [
    { label: 'Jan', value: 12.5 },
    { label: 'Feb', value: 18.2 },
    { label: 'Mar', value: 15.8 },
  ],
  legend: { show: false },
  animation: { duration: 800 },
});

setTimeout(function() {
  var svg = el.querySelector('svg');
  if (svg) {
    var html = svg.outerHTML.substring(0, 1000);
    console.log('SVG found, content:', html);
  } else {
    console.log('NO SVG in element');
    console.log('Inner HTML:', el.innerHTML.substring(0, 500));
  }
  console.log('Chart area size:', c._card.getChartArea().clientWidth, 'x', c._card.getChartArea().clientHeight);
  console.log('Bars array:', c._bars);
}, 1500);
</script>
</body></html>
